name: "Job-level status badge"
description: "Generates a job-level status badge and pushes it to a ghost ref"
branding:
    icon: check-circle
    color: purple
inputs:
    badge:
        description: "Unique identifier for this badge"
        required: false
    title:
        description: "Custom text to display on the left side of the badge"
        required: false

runs:
    using: "composite"
    steps:
        -   name: Interpret status
            id: status
            shell: bash
            run: |
                IS_VALID="false"

                # Handle if the action is running via a 'workflow_run' trigger
                if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
                    if [[ "${{ github.event.workflow_run.event }}" != "pull_request" ]] && \
                       [[ "${{ github.event.workflow_run.head_branch }}" == "${{ github.event.repository.default_branch }}" ]]; then
                        IS_VALID="true"
                    fi
                # Handle standard direct triggers (push, schedule, workflow_dispatch)
                elif [[ "${{ github.event_name }}" != "pull_request" ]] && \
                    [[ "${{ github.ref }}" == "refs/heads/${{ github.event.repository.default_branch }}" ]]; then
                    IS_VALID="true"
                fi

                if [[ "$IS_VALID" != "true" ]]; then
                    echo "status=none" >> $GITHUB_OUTPUT
                    echo "Skipping badge generation: Not on the default branch or triggered by a PR."
                elif [[ "${{ job.status }}" == "success" ]]; then
                    echo "status=passing" >> $GITHUB_OUTPUT
                else
                    echo "status=failing" >> $GITHUB_OUTPUT
                fi

                EXPLICIT_NAME="${{ inputs.badge }}"

                if [[ -n "$EXPLICIT_NAME" ]]; then
                    echo "badge=$EXPLICIT_NAME" >> $GITHUB_OUTPUT
                else
                    # replace spaces with hyphens
                    WORKFLOW_NAME="${{ github.workflow }}"
                    WORKFLOW_ID="${WORKFLOW_NAME// /-}"
                    JOB_ID="${{ github.job }}"

                    # reject anything that isn't alphanumeric, a hyphen, or an underscore
                    if [[ "$WORKFLOW_ID" =~ [^a-zA-Z0-9_-] ]] || [[ "$JOB_ID" =~ [^a-zA-Z0-9_-] ]]; then
                        echo "::error title=Invalid Characters::Workflow name ('$WORKFLOW_NAME') or Job ID ('$JOB_ID') contains invalid characters. Please pass an explicit 'badge_name' input."
                        exit 1
                    fi

                    echo "badge=${WORKFLOW_ID}/${JOB_ID}" >> $GITHUB_OUTPUT
                fi

        -   name: Create badge
            shell: bash
            if: steps.status.outputs.status != 'none'
            run: |
                "${{ github.action_path }}/Scripts/RenderBadge" \
                    "${{ github.action_path }}/Resources/badge.svg.template" \
                    "${{ inputs.title || github.job }}" \
                    "${{ steps.status.outputs.status }}"

        -   name: Create ghost ref
            shell: bash
            if: steps.status.outputs.status != 'none'
            run: |
                mkdir -p /tmp/rarestbadge
                cd /tmp/rarestbadge

                git init --quiet

                git config user.name "rarest automation"
                git config user.email "automation@noreply.rarestype.com"

                cp $GITHUB_WORKSPACE/badge.svg status.svg

                git add status.svg

                if [[ "${{ github.event.repository.private }}" == "true" ]]; then
                    echo "Private repository detected, using git tag workaround..."
                    export GIT_AUTHOR_DATE="1970-01-01T00:00:00Z"
                    export GIT_COMMITTER_DATE="1970-01-01T00:00:00Z"
                    REF_NAMESPACE=refs/tags/badges
                else
                    REF_NAMESPACE=refs/badges
                fi

                git commit -m "update badge: ${{ steps.status.outputs.badge }} (${{ steps.status.outputs.status }})"

                git push --force \
                    "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
                    "HEAD:${REF_NAMESPACE}/ci/${{ steps.status.outputs.badge }}"
